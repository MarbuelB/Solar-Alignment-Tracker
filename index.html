<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Alignment Tracker</title>
    <script src="libs/suncalc.min.js"></script>
    <script src="libs/tz.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const styleInput = urlParams.get('style');
        let initialStyle = 'full';
        if (styleInput === 'simple') initialStyle = 'simple';
        else if (styleInput === 'table') initialStyle = 'table';
        else if (styleInput === 'radar') initialStyle = 'radar';
        
        document.body.className = `style-${initialStyle}`;
        window.currentAppStyle = initialStyle;

        // Apply styling parameters
        const customColor = urlParams.get('color');
        if (customColor) {
            document.body.style.setProperty('--text-color', '#' + customColor.replace('#', ''));
        }
        
        const bgColor = urlParams.get('bgcolor');
        if (bgColor === 'transparent') {
            document.body.style.setProperty('--bg-color', 'transparent');
            document.body.style.setProperty('--card-bg', 'transparent');
        } else if (bgColor) {
            document.body.style.setProperty('--bg-color', '#' + bgColor.replace('#', ''));
            document.body.style.setProperty('--card-bg', '#' + bgColor.replace('#', ''));
        }
    })();
</script>

<div class="container">
    <div class="full-ui-element" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="margin: 0;">Solar Alignment Tracker</h1>
        <div class="actions" style="margin: 0;">
            <button class="btn-secondary" onclick="exportCSV()">Export Data</button>
            <button class="btn-primary" style="background-color: #48bb78; border-color: #48bb78;" onclick="openUrlModal()">Create URL</button>
        </div>
    </div>
    
    <div id="simple_location_title" class="location-header"></div>
    
    <div class="full-ui-element grid">
        <div class="form-group">
            <label for="location_select">Location Profile</label>
            <select id="location_select" onchange="loadSelectedLocationProfile()"></select>
        </div>
        <div class="form-group">
            <label for="start_date">Start Date</label>
            <input type="date" id="start_date" onblur="calculateSolarTransits()" onkeydown="if(event.key === 'Enter') this.blur();">
        </div>
        <div class="form-group">
            <label for="end_date">End Date</label>
            <input type="date" id="end_date" onblur="calculateSolarTransits()" onkeydown="if(event.key === 'Enter') this.blur();">
        </div>
    </div>

    <div id="custom_location_inputs" class="full-ui-element" style="display: grid; grid-template-columns: 1fr 1fr 4fr; gap: 15px; background: rgba(49, 130, 206, 0.05); padding: 15px; border-radius: 6px; border: 1px dashed var(--primary-color); margin-bottom: 20px;">
        <div class="form-group">
            <label for="custom_lat">Latitude</label>
            <input type="number" id="custom_lat" step="any" placeholder="e.g. 47.56" onchange="updateCustomProfile()">
        </div>
        <div class="form-group">
            <label for="custom_lng">Longitude</label>
            <input type="number" id="custom_lng" step="any" placeholder="e.g. 7.58" onchange="updateCustomProfile()">
        </div>
        <div class="form-group">
            <label for="custom_headings">Headings (Name:Azimuth, comma sep)</label>
            <input type="text" id="custom_headings" placeholder="e.g. Az1:90, 180, 270" onchange="updateCustomProfile()">
        </div>
    </div>

    <div class="dashboard-layout">
        <div class="table-container">
            <table id="results_table">
                <thead><tr id="table_header"></tr></thead>
                <tbody id="table_body"></tbody>
            </table>
        </div>

        <div class="compass-card">
            
            <div class="radar-controls">
                <label class="radar-live-label" style="align-self: flex-start; margin-bottom: 5px;">
                    <input type="checkbox" id="radar_live_check" checked onchange="toggleRadarLiveMode()"> Live Tracking (Now)
                </label>
                <div class="radar-time-inputs">
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <label for="radar_local_time" style="font-size: 0.75rem; margin:0;">Local Time (You)</label>
                        <input type="datetime-local" id="radar_local_time" class="radar-time-input" style="width: 60%;" disabled onblur="handleTimeEdit('local')" onkeydown="if(event.key === 'Enter') this.blur();">
                    </div>
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <label for="radar_dest_time" style="font-size: 0.75rem; margin:0;">Dest. Time (GPS)</label>
                        <input type="datetime-local" id="radar_dest_time" class="radar-time-input" style="width: 60%;" disabled onblur="handleTimeEdit('dest')" onkeydown="if(event.key === 'Enter') this.blur();">
                    </div>
                </div>
            </div>
            <div id="radar_location_header" style="font-size: 0.8rem; margin-bottom: 10px; color: var(--text-color); text-align:center; line-height: 1.4;"></div>
            
            <svg class="compass-svg" id="compass_radar" viewBox="0 0 200 200" style="overflow: visible;">
                <circle cx="100" cy="100" r="72" fill="none" stroke="var(--border-color)" stroke-width="2"/>
                <line x1="20" y1="100" x2="180" y2="100" stroke="var(--border-color)" opacity="0.5"/>
                <line x1="100" y1="20" x2="100" y2="180" stroke="var(--border-color)" opacity="0.5"/>
                <g id="radar_headings"></g>
                <g id="radar_sun_node"></g>
            </svg>
            <div id="live_metrics" style="font-size: 0.8rem; margin-top: 10px; color: var(--text-color); text-align:center; line-height: 1.4;"></div>
        </div>
    </div>
</div>

<script>
    let activeCSVPayload = "";
    let localActiveHeadings = [];
    
    let cachedDailyProfile = {
        dateStr: null,
        lat: null,
        lng: null,
        data: null
    };

    window.addEventListener('DOMContentLoaded', () => {
        initializeApplicationState();
    });

    function initializeApplicationState() {
        let currentRadarAbsoluteTime = new Date();

        window.getDestIsoString = function(dateObj, tz) {
            try {
                const parts = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', hour12: false
                }).formatToParts(dateObj);
                
                let p = {};
                parts.forEach(part => { p[part.type] = part.value; });
                if (p.hour === '24') p.hour = '00';
                
                return `${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}`;
            } catch(e) {
                const offsetMs = dateObj.getTimezoneOffset() * 60000;
                return new Date(dateObj.getTime() - offsetMs).toISOString().slice(0, 16);
            }
        };

        window.getAbsoluteDateFromDestIso = function(destIso, tz) {
            let guessDate = new Date(destIso); 
            try {
                for(let i=0; i<3; i++) {
                    let currentDestIso = window.getDestIsoString(guessDate, tz);
                    let diffMs = new Date(destIso).getTime() - new Date(currentDestIso).getTime();
                    if(diffMs === 0) break;
                    guessDate = new Date(guessDate.getTime() + diffMs);
                }
            } catch(e) {}
            return guessDate;
        };
        const urlParams = new URLSearchParams(window.location.search);

        const customLat = urlParams.get('lat');
        const customLng = urlParams.get('lng');
        const customHeadings = urlParams.get('headings');
        const customName = urlParams.get('name');

        if (customLat && customLng && customHeadings) {
            let parsedHeadings = [];
            let azCounter = 1;
            customHeadings.split(',').forEach(t => {
                t = t.trim();
                if (t.includes(':')) {
                    let parts = t.split(':');
                    let name = parts[0].trim();
                    let az = parseFloat(parts[1].trim());
                    if (!isNaN(az)) {
                        parsedHeadings.push({ name: name, azimuth: az });
                    }
                } else {
                    let az = parseFloat(t);
                    if (!isNaN(az)) {
                        parsedHeadings.push({ name: `Az${azCounter}`, azimuth: az });
                        azCounter++;
                    }
                }
            });

            if (parsedHeadings.length > 0 && !isNaN(parseFloat(customLat)) && !isNaN(parseFloat(customLng))) {
                window.SOLAR_CONFIG.locations["custom"] = {
                    name: customName || "Custom Location",
                    lat: parseFloat(customLat),
                    lng: parseFloat(customLng),
                    headings: parsedHeadings
                };
            }
        }

        // Populate custom input fields from URL state if present
        if (customLat) document.getElementById('custom_lat').value = customLat;
        if (customLng) document.getElementById('custom_lng').value = customLng;
        if (customHeadings) document.getElementById('custom_headings').value = customHeadings;

        if (!window.SOLAR_CONFIG.locations["custom"]) {
            window.SOLAR_CONFIG.locations["custom"] = { name: "Custom Location", lat: 0, lng: 0, headings: [] };
        }

        // Hydrate Control Dropdown listings
        const selectElement = document.getElementById('location_select');
        Object.keys(window.SOLAR_CONFIG.locations).forEach(key => {
            if (key === 'custom') return; // Skip so we can add it at the end
            let option = document.createElement('option');
            option.value = key;
            option.innerText = window.SOLAR_CONFIG.locations[key].name;
            selectElement.appendChild(option);
        });

        let customOption = document.createElement('option');
        customOption.value = "custom";
        customOption.innerText = "-- Custom Location --";
        selectElement.appendChild(customOption);

        // Evaluate Date Directives (Defaulting to Single Day: Today to Today)
        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('start_date').value = urlParams.get('from') || todayStr;
        document.getElementById('end_date').value = urlParams.get('to') || urlParams.get('from') || todayStr;

        // Resolve Target Geographic Profiling ID
        let headingLocId = urlParams.get('location');
        if (customLat && customLng && customHeadings && !headingLocId) {
            headingLocId = "custom";
        } else if (!headingLocId) {
            headingLocId = window.SOLAR_CONFIG.defaultLocationId;
        }

        if (!window.SOLAR_CONFIG.locations[headingLocId]) {
            headingLocId = window.SOLAR_CONFIG.defaultLocationId;
        }
        selectElement.value = headingLocId;

        // Initialize Time
        const freezeDatetime = urlParams.get('datetime');
        if (freezeDatetime) {
            let tz = 'UTC';
            const profile = window.SOLAR_CONFIG.locations[headingLocId];
            try { if(typeof tzlookup === 'function') tz = tzlookup(profile.lat, profile.lng); } catch(e) {}
            
            let parsedDate = window.getAbsoluteDateFromDestIso(freezeDatetime, tz);
            if (!isNaN(parsedDate.getTime())) {
                document.getElementById('radar_live_check').checked = false;
                window.currentRadarAbsoluteTime = parsedDate;
                syncRadarInputs(parsedDate);
            } else {
                syncRadarInputs(new Date());
            }
        } else {
            syncRadarInputs(new Date());
        }

        loadSelectedLocationProfile();

        let updateRateMs = 1000;
        const updateParam = urlParams.get('update');
        if (updateParam) {
            let s = parseFloat(updateParam);
            if (!isNaN(s) && s > 0) {
                updateRateMs = s * 1000;
            }
        }

        if (window.currentAppStyle === 'full' || window.currentAppStyle === 'radar') {
            setInterval(updateLiveRadarPositionLoop, updateRateMs); 
        }
    }

    function syncRadarInputs(dateObj) {
        window.currentRadarAbsoluteTime = dateObj;
        const selectedId = document.getElementById('location_select').value;
        const profile = window.SOLAR_CONFIG.locations[selectedId];
        let tz = 'UTC';
        try { if(typeof tzlookup === 'function') tz = tzlookup(profile.lat, profile.lng); } catch(e) {}

        const offsetMs = dateObj.getTimezoneOffset() * 60000;
        const localIso = new Date(dateObj.getTime() - offsetMs).toISOString().slice(0, 16);
        const destIso = window.getDestIsoString(dateObj, tz);
        
        document.getElementById('radar_local_time').value = localIso;
        document.getElementById('radar_dest_time').value = destIso;
    }

    function handleTimeEdit(source) {
        document.getElementById('radar_live_check').checked = false;
        toggleRadarLiveMode();

        const selectedId = document.getElementById('location_select').value;
        const profile = window.SOLAR_CONFIG.locations[selectedId];
        let tz = 'UTC';
        try { if(typeof tzlookup === 'function') tz = tzlookup(profile.lat, profile.lng); } catch(e) {}

        if (source === 'local') {
            const localIso = document.getElementById('radar_local_time').value;
            if(!localIso) return;
            window.currentRadarAbsoluteTime = new Date(localIso);
            document.getElementById('radar_dest_time').value = window.getDestIsoString(window.currentRadarAbsoluteTime, tz);
        } else if (source === 'dest') {
            const destIso = document.getElementById('radar_dest_time').value;
            if(!destIso) return;
            window.currentRadarAbsoluteTime = window.getAbsoluteDateFromDestIso(destIso, tz);
            const offsetMs = window.currentRadarAbsoluteTime.getTimezoneOffset() * 60000;
            document.getElementById('radar_local_time').value = new Date(window.currentRadarAbsoluteTime.getTime() - offsetMs).toISOString().slice(0, 16);
        }
        
        updateLiveRadarPosition();
    }

    function toggleRadarLiveMode() {
        const isLive = document.getElementById('radar_live_check').checked;
        document.getElementById('radar_local_time').disabled = isLive;
        document.getElementById('radar_dest_time').disabled = isLive;
        
        if (isLive) {
            syncRadarInputs(new Date());
        }
        updateLiveRadarPosition();
    }

    function updateLiveRadarPositionLoop() {
        if (document.getElementById('radar_live_check').checked) {
            syncRadarInputs(new Date());
            updateLiveRadarPosition();
        }
    }

    function loadSelectedLocationProfile() {
        const selectedId = document.getElementById('location_select').value;
        const profile = window.SOLAR_CONFIG.locations[selectedId];
        
        // If a predefined profile is loaded, populate the custom input fields so they can be edited easily
        if (selectedId !== 'custom') {
            document.getElementById('custom_lat').value = profile.lat;
            document.getElementById('custom_lng').value = profile.lng;
            document.getElementById('custom_headings').value = profile.headings.map(t => `${t.name}:${t.azimuth}`).join(', ');
        }

        localActiveHeadings = profile.headings;
        
        document.getElementById('simple_location_title').innerText = `Location: ${profile.name}`;
        
        // Update radar location header
        document.getElementById('radar_location_header').innerHTML = `
            <strong>${profile.name}</strong><br>
            ${profile.lat.toFixed(4)}°, ${profile.lng.toFixed(4)}°
        `;

        calculateSolarTransits();
        
        if (!document.getElementById('radar_live_check').checked) {
            handleTimeEdit('local'); // Re-evaluate destination time based on new coordinates
        } else {
            updateLiveRadarPosition();
        }
    }

    function updateCustomProfile() {
        const lat = parseFloat(document.getElementById('custom_lat').value);
        const lng = parseFloat(document.getElementById('custom_lng').value);
        const headingsStr = document.getElementById('custom_headings').value;

        let parsedHeadings = [];
        let azCounter = 1;
        if (headingsStr) {
            headingsStr.split(',').forEach(t => {
                t = t.trim();
                if (t.includes(':')) {
                    let parts = t.split(':');
                    let name = parts[0].trim();
                    let az = parseFloat(parts[1].trim());
                    if (!isNaN(az)) {
                        parsedHeadings.push({ name: name, azimuth: az });
                    }
                } else {
                    let az = parseFloat(t);
                    if (!isNaN(az)) {
                        parsedHeadings.push({ name: `Az${azCounter}`, azimuth: az });
                        azCounter++;
                    }
                }
            });
        }

        window.SOLAR_CONFIG.locations["custom"] = {
            name: "Custom Location",
            lat: isNaN(lat) ? 0 : lat,
            lng: isNaN(lng) ? 0 : lng,
            headings: parsedHeadings
        };

        // Switch the dropdown to custom if it's not already
        const selectEl = document.getElementById('location_select');
        if (selectEl.value !== 'custom') {
            selectEl.value = 'custom';
        }

        localActiveHeadings = window.SOLAR_CONFIG.locations["custom"].headings;
        document.getElementById('simple_location_title').innerText = `Location: Custom Location`;

        cachedRadarHeadings.locationId = null; // force invalidate radar cache
        calculateSolarTransits();
        updateLiveRadarPosition();
    }

    function getCompassSolarPosition(date, lat, lng) {
        const rawPos = SunCalc.getPosition(date, lat, lng);
        let compassAzimuth = (rawPos.azimuth * 180 / Math.PI) + 180;
        return { azimuth: compassAzimuth % 360, elevation: rawPos.altitude * 180 / Math.PI };
    }

    function findIntersectionIntersection(headingAz, dayTimes, dayAzimuths, dayElevations) {
        for (let i = 0; i < dayAzimuths.length - 1; i++) {
            let az1 = dayAzimuths[i], az2 = dayAzimuths[i+1];
            if (dayElevations[i] <= -2 && dayElevations[i+1] <= -2) continue;

            let diff = az2 - az1;
            if (diff < -180) diff += 360; if (diff > 180) diff -= 360;
            let headingDiff = headingAz - az1;
            if (headingDiff < -180) headingDiff += 360; if (headingDiff > 180) headingDiff -= 360;

            if (Math.sign(headingDiff) === Math.sign(diff) && Math.abs(headingDiff) <= Math.abs(diff)) {
                return new Date(dayTimes[i].getTime() + (headingDiff / diff) * (dayTimes[i+1].getTime() - dayTimes[i].getTime()));
            }
        }
        return null;
    }
    
    let cachedRadarHeadings = { dateStr: null, locationId: null, data: [] };

    function getSolarDayProfile(dateObj, lat, lng, tz) {
        let curDateStr = window.getDestIsoString ? window.getDestIsoString(dateObj, tz).split('T')[0] : dateObj.toISOString().split('T')[0];
        
        if (cachedDailyProfile.dateStr === curDateStr && cachedDailyProfile.lat === lat && cachedDailyProfile.lng === lng) {
            return cachedDailyProfile.data;
        }

        let scan, scanEnd;
        if (typeof window.getAbsoluteDateFromDestIso === 'function' && tz !== 'UTC') {
            scan = window.getAbsoluteDateFromDestIso(`${curDateStr}T00:00`, tz);
            scanEnd = window.getAbsoluteDateFromDestIso(`${curDateStr}T23:59`, tz);
        } else {
            scan = new Date(`${curDateStr}T00:00:00`);
            scanEnd = new Date(`${curDateStr}T23:59:59`);
        }
        
        let dayTimes = [], dayAzimuths = [], dayElevations = [];
        const stepInterval = window.SOLAR_CONFIG.precisionMinutes || 1;
        while (scan <= scanEnd) {
            let pos = getCompassSolarPosition(scan, lat, lng);
            dayTimes.push(new Date(scan)); dayAzimuths.push(pos.azimuth); dayElevations.push(pos.elevation);
            scan.setMinutes(scan.getMinutes() + stepInterval); 
        }
        
        let midDay = dayTimes[Math.floor(dayTimes.length / 2)]; // Get exact middle of the simulation day
        let sunTimes = SunCalc.getTimes(midDay, lat, lng);
        let sunriseStr = "--:--", sunsetStr = "--:--";
        let srDurStr = "", ssDurStr = "";
        let srCenter, ssCenter;
        
        try {
            const formatTime = (d) => {
                const parts = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
                }).formatToParts(d);
                let p = {};
                parts.forEach(part => { p[part.type] = part.value; });
                if (p.hour === '24') p.hour = '00';
                return `${p.hour}:${p.minute}:${p.second}`;
            };
            if (sunTimes.sunrise && sunTimes.sunriseEnd && !isNaN(sunTimes.sunrise) && !isNaN(sunTimes.sunriseEnd)) {
                srCenter = new Date((sunTimes.sunrise.getTime() + sunTimes.sunriseEnd.getTime()) / 2);
                sunriseStr = formatTime(srCenter);
                let durMs = Math.abs(sunTimes.sunrise.getTime() - sunTimes.sunriseEnd.getTime()) / 2;
                let durM = Math.floor(durMs / 60000); let durS = Math.floor((durMs % 60000) / 1000);
                srDurStr = `± ${durM}:${durS.toString().padStart(2, '0')}`;
            }
            if (sunTimes.sunset && sunTimes.sunsetStart && !isNaN(sunTimes.sunset) && !isNaN(sunTimes.sunsetStart)) {
                ssCenter = new Date((sunTimes.sunset.getTime() + sunTimes.sunsetStart.getTime()) / 2);
                sunsetStr = formatTime(ssCenter);
                let durMs = Math.abs(sunTimes.sunset.getTime() - sunTimes.sunsetStart.getTime()) / 2;
                let durM = Math.floor(durMs / 60000); let durS = Math.floor((durMs % 60000) / 1000);
                ssDurStr = `± ${durM}:${durS.toString().padStart(2, '0')}`;
            }
        } catch(e) {}
        
        cachedDailyProfile.dateStr = curDateStr;
        cachedDailyProfile.lat = lat;
        cachedDailyProfile.lng = lng;
        cachedDailyProfile.data = { dayTimes, dayAzimuths, dayElevations, sunriseStr, sunsetStr, srDurStr, ssDurStr, sunriseDate: srCenter, sunsetDate: ssCenter };
        
        return cachedDailyProfile.data;
    }

    function calculateSolarTransits() {
        const selectedId = document.getElementById('location_select').value;
        const configProfile = window.SOLAR_CONFIG.locations[selectedId];
        const startStr = document.getElementById('start_date').value;
        const endStr = document.getElementById('end_date').value;

        let startD = new Date(startStr), endD = new Date(endStr);
        let tHeader = document.getElementById('table_header'), tBody = document.getElementById('table_body');

        const suppressDateColumn = (window.currentAppStyle === 'table' && startStr === endStr);

        let headerHTML = '';
        let csvHeader = [];

        if (!suppressDateColumn) {
            headerHTML += '<th>Calendar Date</th>';
            csvHeader.push('Date');
        }

        configProfile.headings.forEach(tgt => {
            headerHTML += `<th>${tgt.name} (${tgt.azimuth}°)</th>`;
            csvHeader.push(`${tgt.name}_${tgt.azimuth}`);
        });
        tHeader.innerHTML = headerHTML;
        tBody.innerHTML = '';

        let csvRows = [csvHeader.join(',')];
        let loopD = new Date(startD);
        let tz = 'UTC';
        try { if(typeof tzlookup === 'function') tz = tzlookup(configProfile.lat, configProfile.lng); } catch(e) {}

        const stepInterval = window.SOLAR_CONFIG.precisionMinutes || 1;

        while (loopD <= endD) {
            let curDateStr = window.getDestIsoString ? window.getDestIsoString(loopD, tz).split('T')[0] : loopD.toISOString().split('T')[0];
            let { dayTimes, dayAzimuths, dayElevations } = getSolarDayProfile(loopD, configProfile.lat, configProfile.lng, tz);

            let rowHTML = '';
            let csvRowData = [];

            if (!suppressDateColumn) {
                rowHTML += `<td><strong>${curDateStr}</strong></td>`;
                csvRowData.push(curDateStr);
            }

            configProfile.headings.forEach(tgt => {
                let match = findIntersectionIntersection(tgt.azimuth, dayTimes, dayAzimuths, dayElevations);
                let timeStr = "N/A";
                if (match) {
                    try {
                        const parts = new Intl.DateTimeFormat('en-US', {
                            timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
                        }).formatToParts(match);
                        let p = {};
                        parts.forEach(part => { p[part.type] = part.value; });
                        if (p.hour === '24') p.hour = '00';
                        timeStr = `${p.hour}:${p.minute}:${p.second}`;
                        
                        // Calculate +/- duration for 0.53 degree sun disk
                        let matchOffset = findIntersectionIntersection(tgt.azimuth - 0.2665, dayTimes, dayAzimuths, dayElevations) || 
                                          findIntersectionIntersection(tgt.azimuth + 0.2665, dayTimes, dayAzimuths, dayElevations);
                        
                        let durStrHtml = "";
                        let durStrCsv = "";
                        
                        if (matchOffset) {
                            let durMs = Math.abs(match.getTime() - matchOffset.getTime());
                            let durM = Math.floor(durMs / 60000);
                            let durS = Math.floor((durMs % 60000) / 1000);
                            let durFormatted = `${durM}:${durS.toString().padStart(2, '0')}`;
                            durStrHtml = ` ± ${durFormatted}`;
                            durStrCsv = ` (${durFormatted})`;
                        }
                        
                        rowHTML += `<td><span class="pill">${timeStr}${durStrHtml}</span></td>`;
                        csvRowData.push(`${timeStr}${durStrCsv}`);
                    } catch(e) {
                        console.error("Timezone formatting error:", e, "tz:", tz);
                        timeStr = match.toTimeString().split(' ')[0];
                        rowHTML += `<td><span class="pill">${timeStr}</span></td>`;
                        csvRowData.push(timeStr);
                    }
                } else {
                    rowHTML += `<td><span class="pill">${timeStr}</span></td>`;
                    csvRowData.push(timeStr);
                }
            });

            csvRows.push(csvRowData.join(','));
            let tr = document.createElement('tr'); tr.innerHTML = rowHTML; tBody.appendChild(tr);

            loopD.setDate(loopD.getDate() + 1);
        }
        activeCSVPayload = csvRows.join('\n');
    }

    function updateLiveRadarPosition() {
        if (window.currentAppStyle === 'simple' || window.currentAppStyle === 'table') return;

        const selectedId = document.getElementById('location_select').value;
        const profile = window.SOLAR_CONFIG.locations[selectedId];
        
        // Use checkbox conditional flag state to toggle between true local time or manual override pickers
        let headingEvalTime;
        if (document.getElementById('radar_live_check').checked) {
            headingEvalTime = new Date();
            syncRadarInputs(headingEvalTime);
        } else {
            headingEvalTime = window.currentRadarAbsoluteTime || new Date();
        }

        const currentPos = getCompassSolarPosition(headingEvalTime, profile.lat, profile.lng);

        const getCoordinates = (azimuth, radius) => {
            let rad = (azimuth * Math.PI / 180);
            return { x: 100 + radius * Math.cos(rad), y: 100 + radius * Math.sin(rad) };
        };

        let tz = 'UTC';
        try { if(typeof tzlookup === 'function') tz = tzlookup(profile.lat, profile.lng); } catch(e) {}
        
        let { dayTimes, dayAzimuths, dayElevations, sunriseStr, sunsetStr, srDurStr, ssDurStr, sunriseDate, sunsetDate } = getSolarDayProfile(headingEvalTime, profile.lat, profile.lng, tz);

        let headingGroup = document.getElementById('radar_headings');
        
        // Clean inner layout loops - gray scale text label layers have been permanently wiped
        headingGroup.innerHTML = `
            <circle cx="100" cy="100" r="48" fill="none" stroke="#a0aec0" stroke-width="1" stroke-dasharray="3,3"/>
            <circle cx="100" cy="100" r="24" fill="none" stroke="#a0aec0" stroke-width="1" stroke-dasharray="3,3"/>
            <text x="148" y="98" font-size="5" fill="#718096" text-anchor="middle" transform="rotate(90, 148, 98)">30°</text>
            <text x="124" y="98" font-size="5" fill="#718096" text-anchor="middle" transform="rotate(90, 124, 98)">60°</text>
        `;
        
        let renderHeadings = [];
        let curDateStr = cachedDailyProfile.dateStr;
        if (cachedRadarHeadings.dateStr !== curDateStr || cachedRadarHeadings.locationId !== selectedId) {
            let compiledHeadings = [...profile.headings];
            compiledHeadings.forEach(tgt => {
                tgt.timeStr = "--:--:--";
                tgt.durStr = "";
                let match = findIntersectionIntersection(tgt.azimuth, dayTimes, dayAzimuths, dayElevations);
                if (match) {
                    try {
                        const parts = new Intl.DateTimeFormat('en-US', {
                            timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
                        }).formatToParts(match);
                        let p = {};
                        parts.forEach(part => { p[part.type] = part.value; });
                        if (p.hour === '24') p.hour = '00';
                        tgt.timeStr = `${p.hour}:${p.minute}:${p.second}`;
                    } catch(e) { tgt.timeStr = "N/A"; }
                    
                    let matchOffset = findIntersectionIntersection(tgt.azimuth - 0.2665, dayTimes, dayAzimuths, dayElevations) || 
                                      findIntersectionIntersection(tgt.azimuth + 0.2665, dayTimes, dayAzimuths, dayElevations);
                    if (matchOffset) {
                        let durMs = Math.abs(match.getTime() - matchOffset.getTime());
                        let durM = Math.floor(durMs / 60000);
                        let durS = Math.floor((durMs % 60000) / 1000);
                        tgt.durStr = `± ${durM}:${durS.toString().padStart(2, '0')}`;
                    }
                }
            });
            cachedRadarHeadings.dateStr = curDateStr;
            cachedRadarHeadings.locationId = selectedId;
            cachedRadarHeadings.data = compiledHeadings;
        }
        
        renderHeadings = [...cachedRadarHeadings.data];
        
        if (sunriseDate && !isNaN(sunriseDate)) {
            let srPos = getCompassSolarPosition(sunriseDate, profile.lat, profile.lng);
            renderHeadings.push({ name: "Sunrise", azimuth: srPos.azimuth, isSunEvent: true, timeStr: sunriseStr, durStr: srDurStr });
        }
        if (sunsetDate && !isNaN(sunsetDate)) {
            let ssPos = getCompassSolarPosition(sunsetDate, profile.lat, profile.lng);
            renderHeadings.push({ name: "Sunset", azimuth: ssPos.azimuth, isSunEvent: true, timeStr: sunsetStr, durStr: ssDurStr });
        }

        // Render vector intersections along with structural split multiline tspan configurations
        renderHeadings.forEach(tgt => {
            let pt = getCoordinates(tgt.azimuth, 72);       
            let textPt = getCoordinates(tgt.azimuth, 88);   
            
            let timeStr = tgt.timeStr || "--:--:--";
            let durStr = tgt.durStr || "";
            
            let lineStyle = tgt.isSunEvent 
                ? `stroke="var(--text-color)" stroke-width="1.5" opacity="0.6"` 
                : `stroke="var(--text-color)" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.3"`;
            
            let displayAzimuth = typeof tgt.azimuth === 'number' ? tgt.azimuth.toFixed(1) : tgt.azimuth;

            headingGroup.innerHTML += `
                <line x1="100" y1="100" x2="${pt.x}" y2="${pt.y}" ${lineStyle}/>
                <circle cx="${pt.x}" cy="${pt.y}" r="3.5" fill="var(--text-color)"/>
                <text x="${textPt.x}" y="${textPt.y}" 
                      font-size="6" 
                      font-weight="600"
                      fill="var(--text-color)" 
                      text-anchor="middle"
                      transform="rotate(90, ${textPt.x}, ${textPt.y})">
                    <tspan x="${textPt.x}" dy="-9">${tgt.name}</tspan>
                    <tspan x="${textPt.x}" dy="7.5">${displayAzimuth}°</tspan>
                    <tspan x="${textPt.x}" dy="7.5">${timeStr}</tspan>
                    <tspan x="${textPt.x}" dy="7.5">${durStr}</tspan>
                </text>
            `;
        });

        let sunGroup = document.getElementById('radar_sun_node');
        let metricsDiv = document.getElementById('live_metrics');
        
        if (currentPos.elevation > -0.833) {
            let sunR = 72 * (1 - (currentPos.elevation / 90));
            let sunPt = getCoordinates(currentPos.azimuth, sunR);
            
            sunGroup.innerHTML = `
                <line x1="100" y1="100" x2="${sunPt.x}" y2="${sunPt.y}" stroke="#ecc94b" stroke-width="1.5"/>
                <circle cx="${sunPt.x}" cy="${sunPt.y}" r="6" fill="#ecc94b" stroke="#d69e2e" stroke-width="1"/>
            `;
            metricsDiv.innerHTML = `Sun Azimuth: ${currentPos.azimuth.toFixed(3)}°<br>Sun Elevation: ${currentPos.elevation.toFixed(2)}°`;
        } else {
            sunGroup.innerHTML = '';
            metricsDiv.innerHTML = `Sun Azimuth: ${currentPos.azimuth.toFixed(3)}°<br>Sun Elevation: ${currentPos.elevation.toFixed(2)}° (Night)`;
        }
    }

    function exportCSV() {
        if (!activeCSVPayload) return;
        let blob = new Blob([activeCSVPayload], { type: 'text/csv;charset=utf-8;' });
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "solar_transit_alignment_dataset.csv");
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }
</script>
<!-- URL Generator Modal -->
<div id="url_modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Create Embed URL</h2>
            <button class="close-btn" onclick="closeUrlModal()">&times;</button>
        </div>
        <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <div class="form-group">
                <label>Style</label>
                <select id="modal_style" onchange="generateEmbedUrl()">
                    <option value="full">Full Dashboard</option>
                    <option value="simple">Simple Table</option>
                    <option value="table">Minimal Table Only</option>
                    <option value="radar">Radar Graphic Only</option>
                </select>
            </div>
            <div class="form-group">
                <label>Date & Time</label>
                <select id="modal_date" onchange="generateEmbedUrl()">
                    <option value="actual">Actual (Current Time)</option>
                    <option value="fixed">Fixed Range (Table)</option>
                    <option value="freeze">Freeze Time (Radar)</option>
                </select>
                <input type="datetime-local" id="modal_freeze_time" style="display:none; margin-top:5px; width:90%; font-size: 0.8rem;" onchange="generateEmbedUrl()">
            </div>
            <div class="form-group">
                <label>Text Color</label>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="color" id="modal_color" value="#333333" oninput="document.getElementById('modal_color_hex').textContent = this.value" onchange="generateEmbedUrl()">
                    <span id="modal_color_hex" style="font-family: monospace; font-size: 0.85rem;">#333333</span>
                </div>
            </div>
            <div class="form-group">
                <label>Background Color</label>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="color" id="modal_bgcolor" value="#f4f6f9" oninput="document.getElementById('modal_bgcolor_hex').textContent = this.value" onchange="generateEmbedUrl()">
                    <span id="modal_bgcolor_hex" style="font-family: monospace; font-size: 0.85rem;">#f4f6f9</span>
                    <label style="margin:0; margin-left: auto;"><input type="checkbox" id="modal_bg_transparent" onchange="generateEmbedUrl()"> Transparent</label>
                </div>
            </div>
        </div>
        <div class="url-output-container">
            <textarea id="modal_url_output" readonly rows="4" style="resize: none; flex-grow: 1; padding: 10px; font-family: monospace; border: 1px solid #cbd5e0; border-radius: 6px;"></textarea>
            <button class="btn-primary" onclick="copyEmbedUrl()">Copy</button>
        </div>
    </div>
</div>

<script>
    function rgbToHex(rgb) {
        if (rgb.startsWith('transparent')) return 'transparent';
        let sep = rgb.indexOf(",") > -1 ? "," : " ";
        rgb = rgb.substr(4).split(")")[0].split(sep);
        let r = (+rgb[0]).toString(16), g = (+rgb[1]).toString(16), b = (+rgb[2]).toString(16);
        if (r.length == 1) r = "0" + r;
        if (g.length == 1) g = "0" + g;
        if (b.length == 1) b = "0" + b;
        return "#" + r + g + b;
    }

    function openUrlModal() {
        // Initialize color pickers with current state
        const compStyles = window.getComputedStyle(document.body);
        const curTextColor = compStyles.getPropertyValue('--text-color').trim();
        const curBgColor = compStyles.getPropertyValue('--bg-color').trim();

        if (curTextColor && curTextColor.startsWith('#')) {
            document.getElementById('modal_color').value = curTextColor;
            document.getElementById('modal_color_hex').textContent = curTextColor;
        }
        if (curBgColor) {
            if (curBgColor === 'transparent') {
                document.getElementById('modal_bg_transparent').checked = true;
            } else if (curBgColor.startsWith('#')) {
                document.getElementById('modal_bgcolor').value = curBgColor;
                document.getElementById('modal_bgcolor_hex').textContent = curBgColor;
                document.getElementById('modal_bg_transparent').checked = false;
            } else if (curBgColor.startsWith('rgb')) {
                const hex = rgbToHex(curBgColor);
                if (hex !== 'transparent' && hex !== '#NaNNaNNaN') {
                    document.getElementById('modal_bgcolor').value = hex;
                    document.getElementById('modal_bgcolor_hex').textContent = hex;
                    document.getElementById('modal_bg_transparent').checked = false;
                }
            }
        }

        document.getElementById('url_modal').classList.add('active');
        generateEmbedUrl();
    }

    function closeUrlModal() {
        document.getElementById('url_modal').classList.remove('active');
    }

    function generateEmbedUrl() {
        // Determine base URL (fallback to github.io if local)
        let baseUrl = "https://marbuelb.github.io/Solar-Alignment-Tracker/";
        if (window.location.protocol !== "file:" && window.location.hostname !== "localhost" && window.location.hostname !== "127.0.0.1") {
            // Include index.html if it's currently in the path, otherwise just use origin+pathname
            baseUrl = window.location.origin + window.location.pathname;
        }

        const params = new URLSearchParams();

        // Style
        const style = document.getElementById('modal_style').value;
        if (style !== 'full') params.set('style', style);

        // Location
        const selectedId = document.getElementById('location_select').value;
        if (selectedId === 'custom') {
            params.set('lat', document.getElementById('custom_lat').value);
            params.set('lng', document.getElementById('custom_lng').value);
            params.set('headings', document.getElementById('custom_headings').value);
        } else {
            params.set('location', selectedId);
        }

        // Date & Time
        const dateMode = document.getElementById('modal_date').value;
        const freezeInput = document.getElementById('modal_freeze_time');
        if (dateMode === 'fixed') {
            freezeInput.style.display = 'none';
            params.set('from', document.getElementById('start_date').value);
            params.set('to', document.getElementById('end_date').value);
        } else if (dateMode === 'freeze') {
            freezeInput.style.display = 'block';
            if (freezeInput.value) {
                params.set('datetime', freezeInput.value);
            }
        } else {
            freezeInput.style.display = 'none';
        }

        // Colors
        const color = document.getElementById('modal_color').value;
        if (color !== '#333333' && color !== '#000000') {
            params.set('color', color.replace('#', ''));
        }

        const isTransparent = document.getElementById('modal_bg_transparent').checked;
        const bgColor = document.getElementById('modal_bgcolor').value;
        
        if (isTransparent) {
            params.set('bgcolor', 'transparent');
        } else if (bgColor !== '#f4f6f9' && bgColor !== '#ffffff') {
            params.set('bgcolor', bgColor.replace('#', ''));
        }

        const finalUrl = baseUrl + (params.toString() ? '?' + params.toString() : '');
        document.getElementById('modal_url_output').value = finalUrl;
    }

    function copyEmbedUrl() {
        const output = document.getElementById('modal_url_output');
        output.select();
        document.execCommand('copy');
        alert('URL Copied to clipboard!');
    }
</script>
</body>
